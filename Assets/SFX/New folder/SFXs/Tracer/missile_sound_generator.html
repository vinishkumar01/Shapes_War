
<style>
  #wrap { padding: 1rem 0; font-family: var(--font-mono); }
  .var-card { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; margin-bottom: 10px; }
  .var-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .var-label { font-size: 13px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
  .var-desc { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 10px; }
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
  button.sfx-btn { font-family: var(--font-mono); font-size: 12px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: 6px; padding: 5px 11px; cursor: pointer; color: var(--color-text-primary); transition: background 0.1s; }
  button.sfx-btn:hover { background: var(--color-background-secondary); }
  button.sfx-btn.active { border-color: #378ADD; color: #378ADD; }
  button.dl-btn { font-family: var(--font-mono); font-size: 12px; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: 6px; padding: 5px 11px; cursor: pointer; color: var(--color-text-secondary); }
  button.dl-btn:hover { color: var(--color-text-primary); border-color: var(--color-border-primary); }
  #init-bar { text-align: center; padding: 2rem 0 1rem; }
  #init-btn { font-family: var(--font-mono); font-size: 14px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: 8px; padding: 9px 24px; cursor: pointer; color: var(--color-text-primary); }
  #init-btn:hover { background: var(--color-background-secondary); }
  .vis-bar { display: flex; gap: 2px; align-items: flex-end; height: 22px; margin-left: auto; }

<div id="wrap">
  <div id="init-bar">
    <button id="init-btn">Click to activate audio</button>
  </div>
  <div id="main" style="display:none;">
    <div id="cards"></div>
    <div id="game-section">
      <div class="section-title">live demo — click canvas, then shoot</div>
      <canvas id="game-canvas" width="700" height="220" tabindex="0"></canvas>
      <div class="game-controls">
        <span class="kbd">←</span><span class="kbd">→</span> move &nbsp;|&nbsp;
        <span class="kbd">↑</span><span class="kbd">Space</span> jump &nbsp;|&nbsp;
        <span class="kbd">Z</span> shoot &nbsp;|&nbsp;
        <span class="kbd">1</span>–<span class="kbd">6</span> variation
      </div>
    </div>
  </div>
</div>

<script>
(function(){

let AC, masterGain;
let currentVar = 0;
let activeTravel = null;
let gameStarted = false;

const VARIATIONS = [
  { name: 'V1 — Rocket Hiss',    desc: 'Classic sawtooth rocket with noise hiss, deep thud explosion' },
  { name: 'V2 — Plasma Bolt',    desc: 'High-pitch sine sweep launch, buzzy travel, crackling explosion' },
  { name: 'V3 — Heavy Artillery',desc: 'Low rumble travel, massive low-frequency boom explosion' },
  { name: 'V4 — Sci-Fi Blaster', desc: 'Chirp launch, digital fizz travel, electronic burst explosion' },
  { name: 'V5 — Whistle Bomb',   desc: 'Descending whistle travel, sharp crack + reverb tail explosion' },
  { name: 'V6 — Thunder Strike',  desc: 'Growling launch, layered noise travel, rolling thunder explosion' },
];

function initAudio() {
  AC = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = AC.createGain();
  masterGain.gain.value = 0.7;
  masterGain.connect(AC.destination);
}

// --- Noise buffer ---
function makeNoise(dur, type='white') {
  const len = Math.ceil(AC.sampleRate * dur);
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  if (type === 'white') { for (let i=0;i<len;i++) d[i]=Math.random()*2-1; }
  else { let lv=0; for(let i=0;i<len;i++){lv=lv*0.99+Math.random()*0.01*2-0.01;d[i]=lv*20;} }
  return buf;
}

function noiseSource(buf) {
  const s = AC.createBufferSource(); s.buffer=buf; return s;
}

// ===================== LAUNCH SOUNDS =====================
function playLaunch(v) {
  const t = AC.currentTime;
  if (v===0) { // rocket hiss
    const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(80,t); o.frequency.linearRampToValueAtTime(200,t+0.15);
    const g=AC.createGain(); g.gain.setValueAtTime(0.8,t); g.gain.linearRampToValueAtTime(0,t+0.2);
    const f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=600; f.Q.value=1.5;
    o.connect(f); f.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.25);
    const n=noiseSource(makeNoise(0.25)); const ng=AC.createGain(); ng.gain.setValueAtTime(0.5,t); ng.gain.linearRampToValueAtTime(0,t+0.25);
    n.connect(ng); ng.connect(masterGain); n.start(t);
  } else if(v===1) { // plasma chirp
    const o=AC.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(2000,t+0.12);
    const g=AC.createGain(); g.gain.setValueAtTime(0.7,t); g.gain.linearRampToValueAtTime(0,t+0.15);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.18);
  } else if(v===2) { // heavy boom
    const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(40,t); o.frequency.linearRampToValueAtTime(120,t+0.2);
    const g=AC.createGain(); g.gain.setValueAtTime(1,t); g.gain.linearRampToValueAtTime(0,t+0.25);
    const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=300;
    o.connect(f); f.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.3);
  } else if(v===3) { // sci-fi blaster
    [0,1,2].forEach(i=>{
      const o=AC.createOscillator(); o.type='square'; o.frequency.setValueAtTime(800+i*200,t+i*0.03);
      const g=AC.createGain(); g.gain.setValueAtTime(0.3,t+i*0.03); g.gain.linearRampToValueAtTime(0,t+0.1+i*0.03);
      o.connect(g); g.connect(masterGain); o.start(t+i*0.03); o.stop(t+0.15+i*0.03);
    });
  } else if(v===4) { // whistle
    const o=AC.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(1800,t); o.frequency.exponentialRampToValueAtTime(400,t+0.3);
    const g=AC.createGain(); g.gain.setValueAtTime(0.6,t); g.gain.linearRampToValueAtTime(0,t+0.35);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.38);
  } else { // thunder growl
    const n=noiseSource(makeNoise(0.3,'pink')); const ng=AC.createGain(); ng.gain.setValueAtTime(0,t); ng.gain.linearRampToValueAtTime(1,t+0.05); ng.gain.linearRampToValueAtTime(0,t+0.3);
    const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=400;
    n.connect(f); f.connect(ng); ng.connect(masterGain); n.start(t);
    const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(60,t); o.frequency.linearRampToValueAtTime(180,t+0.2);
    const og=AC.createGain(); og.gain.setValueAtTime(0.7,t); og.gain.linearRampToValueAtTime(0,t+0.3);
    o.connect(og); og.connect(masterGain); o.start(t); o.stop(t+0.35);
  }
}

// ===================== TRAVEL SOUNDS (loopable) =====================
function startTravel(v) {
  stopTravel();
  const t = AC.currentTime;
  const nodes = [];
  const tg = AC.createGain(); tg.gain.setValueAtTime(0,t); tg.gain.linearRampToValueAtTime(1,t+0.08); tg.connect(masterGain);

  if(v===0) { // rocket hiss
    const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.value=160;
    const f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=800; f.Q.value=2;
    const og=AC.createGain(); og.gain.value=0.35; o.connect(f); f.connect(og); og.connect(tg); o.start();
    const n=noiseSource(makeNoise(2,'white')); n.loop=true; const ng=AC.createGain(); ng.gain.value=0.3; n.connect(ng); ng.connect(tg); n.start();
    nodes.push(o,n);
  } else if(v===1) { // plasma buzz
    const o=AC.createOscillator(); o.type='square'; o.frequency.value=440;
    const o2=AC.createOscillator(); o2.type='sawtooth'; o2.frequency.value=443;
    [o,o2].forEach(x=>{ const g=AC.createGain(); g.gain.value=0.2; x.connect(g); g.connect(tg); x.start(); });
    const n=noiseSource(makeNoise(1.5,'white')); n.loop=true; const nf=AC.createBiquadFilter(); nf.type='highpass'; nf.frequency.value=3000; const ng=AC.createGain(); ng.gain.value=0.15; n.connect(nf); nf.connect(ng); ng.connect(tg); n.start();
    nodes.push(o,o2,n);
  } else if(v===2) { // heavy rumble
    const n=noiseSource(makeNoise(2,'pink')); n.loop=true; const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=300; const ng=AC.createGain(); ng.gain.value=0.5; n.connect(f); f.connect(ng); ng.connect(tg); n.start();
    const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.value=55; const og=AC.createGain(); og.gain.value=0.4; o.connect(og); og.connect(tg); o.start();
    nodes.push(n,o);
  } else if(v===3) { // digital fizz
    const o=AC.createOscillator(); o.type='square'; o.frequency.value=1200;
    const lfo=AC.createOscillator(); lfo.type='sine'; lfo.frequency.value=18;
    const lfog=AC.createGain(); lfog.gain.value=300; lfo.connect(lfog); lfog.connect(o.frequency);
    const g=AC.createGain(); g.gain.value=0.2; o.connect(g); g.connect(tg);
    [o,lfo].forEach(x=>x.start());
    nodes.push(o,lfo);
  } else if(v===4) { // whistle descent
    const o=AC.createOscillator(); o.type='sine'; o.frequency.value=900;
    const lfo=AC.createOscillator(); lfo.type='sine'; lfo.frequency.value=5;
    const lfog=AC.createGain(); lfog.gain.value=30; lfo.connect(lfog); lfog.connect(o.frequency);
    const g=AC.createGain(); g.gain.value=0.4; o.connect(g); g.connect(tg);
    [o,lfo].forEach(x=>x.start());
    nodes.push(o,lfo);
  } else { // thunder layered noise
    const n1=noiseSource(makeNoise(2,'pink')); n1.loop=true; const f1=AC.createBiquadFilter(); f1.type='bandpass'; f1.frequency.value=200; f1.Q.value=1; const ng1=AC.createGain(); ng1.gain.value=0.4; n1.connect(f1); f1.connect(ng1); ng1.connect(tg); n1.start();
    const n2=noiseSource(makeNoise(1.5,'white')); n2.loop=true; const f2=AC.createBiquadFilter(); f2.type='bandpass'; f2.frequency.value=1200; f2.Q.value=2; const ng2=AC.createGain(); ng2.gain.value=0.2; n2.connect(f2); f2.connect(ng2); ng2.connect(tg); n2.start();
    nodes.push(n1,n2);
  }

  activeTravel = { nodes, gainNode: tg };
}

function stopTravel() {
  if (!activeTravel) return;
  const t = AC.currentTime;
  activeTravel.gainNode.gain.cancelScheduledValues(t);
  activeTravel.gainNode.gain.linearRampToValueAtTime(0, t+0.12);
  const nodes = activeTravel.nodes;
  setTimeout(()=>{ nodes.forEach(n=>{ try{ n.stop(); }catch(e){} }); }, 200);
  activeTravel = null;
}

// ===================== EXPLOSION SOUNDS =====================
function playExplosion(v) {
  stopTravel();
  const t = AC.currentTime;

  if(v===0) { // deep thud + noise burst
    const n=noiseSource(makeNoise(1.5,'white')); const nf=AC.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=1500; const ng=AC.createGain(); ng.gain.setValueAtTime(1,t); ng.gain.exponentialRampToValueAtTime(0.001,t+1.2); n.connect(nf); nf.connect(ng); ng.connect(masterGain); n.start(t);
    const o=AC.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(80,t); o.frequency.exponentialRampToValueAtTime(20,t+0.5); const og=AC.createGain(); og.gain.setValueAtTime(1,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.5); o.connect(og); og.connect(masterGain); o.start(t); o.stop(t+0.55);
  } else if(v===1) { // crackle burst
    for(let i=0;i<4;i++){
      const n=noiseSource(makeNoise(0.6,'white')); const f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=2000+i*800; f.Q.value=3; const g=AC.createGain(); g.gain.setValueAtTime(0.7,t+i*0.04); g.gain.exponentialRampToValueAtTime(0.001,t+0.5+i*0.05); n.connect(f); f.connect(g); g.connect(masterGain); n.start(t+i*0.04);
    }
  } else if(v===2) { // mega boom
    const n=noiseSource(makeNoise(2,'pink')); const nf=AC.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=500; const ng=AC.createGain(); ng.gain.setValueAtTime(1.5,t); ng.gain.exponentialRampToValueAtTime(0.001,t+2); n.connect(nf); nf.connect(ng); ng.connect(masterGain); n.start(t);
    [40,55,70].forEach((fr,i)=>{
      const o=AC.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(fr,t); o.frequency.exponentialRampToValueAtTime(10,t+0.8); const g=AC.createGain(); g.gain.setValueAtTime(1,t+i*0.02); g.gain.exponentialRampToValueAtTime(0.001,t+0.8); o.connect(g); g.connect(masterGain); o.start(t+i*0.02); o.stop(t+0.9);
    });
  } else if(v===3) { // electronic burst
    const o=AC.createOscillator(); o.type='square'; o.frequency.setValueAtTime(1000,t); o.frequency.exponentialRampToValueAtTime(50,t+0.4); const g=AC.createGain(); g.gain.setValueAtTime(0.8,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5); o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.55);
    const n=noiseSource(makeNoise(0.5,'white')); const ng=AC.createGain(); ng.gain.setValueAtTime(0.6,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.5); n.connect(ng); ng.connect(masterGain); n.start(t);
  } else if(v===4) { // crack + reverb tail
    const n=noiseSource(makeNoise(0.1,'white')); const ng=AC.createGain(); ng.gain.setValueAtTime(1.2,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.1); n.connect(ng); ng.connect(masterGain); n.start(t);
    const tail=noiseSource(makeNoise(1.2,'white')); const tf=AC.createBiquadFilter(); tf.type='highpass'; tf.frequency.value=2000; const tg2=AC.createGain(); tg2.gain.setValueAtTime(0.3,t+0.08); tg2.gain.exponentialRampToValueAtTime(0.001,t+1.5); tail.connect(tf); tf.connect(tg2); tg2.connect(masterGain); tail.start(t+0.08);
  } else { // rolling thunder
    const n=noiseSource(makeNoise(3,'pink')); const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=800; const ng=AC.createGain(); ng.gain.setValueAtTime(0,t); ng.gain.linearRampToValueAtTime(1.2,t+0.05); ng.gain.exponentialRampToValueAtTime(0.001,t+2.5); n.connect(f); f.connect(ng); ng.connect(masterGain); n.start(t);
    [60,90].forEach((fr,i)=>{
      const o=AC.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(fr,t+i*0.03); o.frequency.exponentialRampToValueAtTime(15,t+1+i*0.1); const g=AC.createGain(); g.gain.setValueAtTime(0.8,t+i*0.03); g.gain.exponentialRampToValueAtTime(0.001,t+1+i*0.1); o.connect(g); g.connect(masterGain); o.start(t+i*0.03); o.stop(t+1.2+i*0.1);
    });
  }
}

// ===================== RECORDING / DOWNLOAD =====================
async function recordAndDownload(type, v, label) {
  const offCtx = new OfflineAudioContext(1, AC.sampleRate * (type==='travel'?3:2), AC.sampleRate);
  const offMaster = offCtx.createGain(); offMaster.gain.value=0.7; offMaster.connect(offCtx.destination);

  function offNoise(dur, kind='white') {
    const len = Math.ceil(offCtx.sampleRate * dur);
    const buf = offCtx.createBuffer(1, len, offCtx.sampleRate);
    const d = buf.getChannelData(0);
    if(kind==='white'){for(let i=0;i<len;i++)d[i]=Math.random()*2-1;}
    else{let lv=0;for(let i=0;i<len;i++){lv=lv*0.99+Math.random()*0.01*2-0.01;d[i]=lv*20;}}
    return buf;
  }

  const t = 0.05;

  if(type==='launch') {
    if(v===0){const o=offCtx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(80,t);o.frequency.linearRampToValueAtTime(200,t+0.15);const g=offCtx.createGain();g.gain.setValueAtTime(0.8,t);g.gain.linearRampToValueAtTime(0,t+0.2);const f=offCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=600;f.Q.value=1.5;o.connect(f);f.connect(g);g.connect(offMaster);o.start(t);o.stop(t+0.3);const nb=offNoise(0.3);const n=offCtx.createBufferSource();n.buffer=nb;const ng=offCtx.createGain();ng.gain.setValueAtTime(0.5,t);ng.gain.linearRampToValueAtTime(0,t+0.3);n.connect(ng);ng.connect(offMaster);n.start(t);}
    else if(v===1){const o=offCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(2000,t+0.12);const g=offCtx.createGain();g.gain.setValueAtTime(0.7,t);g.gain.linearRampToValueAtTime(0,t+0.15);o.connect(g);g.connect(offMaster);o.start(t);o.stop(t+0.2);}
    else if(v===2){const o=offCtx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(40,t);o.frequency.linearRampToValueAtTime(120,t+0.2);const g=offCtx.createGain();g.gain.setValueAtTime(1,t);g.gain.linearRampToValueAtTime(0,t+0.25);const f=offCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=300;o.connect(f);f.connect(g);g.connect(offMaster);o.start(t);o.stop(t+0.3);}
    else if(v===3){[0,1,2].forEach(i=>{const o=offCtx.createOscillator();o.type='square';o.frequency.setValueAtTime(800+i*200,t+i*0.03);const g=offCtx.createGain();g.gain.setValueAtTime(0.3,t+i*0.03);g.gain.linearRampToValueAtTime(0,t+0.1+i*0.03);o.connect(g);g.connect(offMaster);o.start(t+i*0.03);o.stop(t+0.2+i*0.03);});}
    else if(v===4){const o=offCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(1800,t);o.frequency.exponentialRampToValueAtTime(400,t+0.3);const g=offCtx.createGain();g.gain.setValueAtTime(0.6,t);g.gain.linearRampToValueAtTime(0,t+0.35);o.connect(g);g.connect(offMaster);o.start(t);o.stop(t+0.4);}
    else{const nb=offNoise(0.35,'pink');const n=offCtx.createBufferSource();n.buffer=nb;const ng=offCtx.createGain();ng.gain.setValueAtTime(0,t);ng.gain.linearRampToValueAtTime(1,t+0.05);ng.gain.linearRampToValueAtTime(0,t+0.35);const f=offCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=400;n.connect(f);f.connect(ng);ng.connect(offMaster);n.start(t);const o=offCtx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(60,t);o.frequency.linearRampToValueAtTime(180,t+0.2);const og=offCtx.createGain();og.gain.setValueAtTime(0.7,t);og.gain.linearRampToValueAtTime(0,t+0.3);o.connect(og);og.connect(offMaster);o.start(t);o.stop(t+0.35);}
  }
  else if(type==='travel') {
    const dur=2.8;
    if(v===0){const o=offCtx.createOscillator();o.type='sawtooth';o.frequency.value=160;const f=offCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=800;f.Q.value=2;const og=offCtx.createGain();og.gain.value=0.35;o.connect(f);f.connect(og);og.connect(offMaster);o.start(t);o.stop(t+dur);const nb=offNoise(dur);const n=offCtx.createBufferSource();n.buffer=nb;const ng=offCtx.createGain();ng.gain.value=0.3;n.connect(ng);ng.connect(offMaster);n.start(t);}
    else if(v===1){const o=offCtx.createOscillator();o.type='square';o.frequency.value=440;const og=offCtx.createGain();og.gain.value=0.2;o.connect(og);og.connect(offMaster);o.start(t);o.stop(t+dur);const nb=offNoise(dur);const n=offCtx.createBufferSource();n.buffer=nb;const nf=offCtx.createBiquadFilter();nf.type='highpass';nf.frequency.value=3000;const ng=offCtx.createGain();ng.gain.value=0.15;n.connect(nf);nf.connect(ng);ng.connect(offMaster);n.start(t);}
    else if(v===2){const nb=offNoise(dur,'pink');const n=offCtx.createBufferSource();n.buffer=nb;const f=offCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=300;const ng=offCtx.createGain();ng.gain.value=0.5;n.connect(f);f.connect(ng);ng.connect(offMaster);n.start(t);const o=offCtx.createOscillator();o.type='sawtooth';o.frequency.value=55;const og=offCtx.createGain();og.gain.value=0.4;o.connect(og);og.connect(offMaster);o.start(t);o.stop(t+dur);}

    else{const nb1=offNoise(dur,'pink');const n1=offCtx.createBufferSource();n1.buffer=nb1;const f1=offCtx.createBiquadFilter();f1.type='bandpass';f1.frequency.value=200;f1.Q.value=1;const ng1=offCtx.createGain();ng1.gain.value=0.4;n1.connect(f1);f1.connect(ng1);ng1.connect(offMaster);n1.start(t);const nb2=offNoise(dur);const n2=offCtx.createBufferSource();n2.buffer=nb2;const f2=offCtx.createBiquadFilter();f2.type='bandpass';f2.frequency.value=1200;f2.Q.value=2;const ng2=offCtx.createGain();ng2.gain.value=0.2;n2.connect(f2);f2.connect(ng2);ng2.connect(offMaster);n2.start(t);}
  }
  else { // explosion
    if(v===0){const nb=offNoise(1.5);const n=offCtx.createBufferSource();n.buffer=nb;const nf=offCtx.createBiquadFilter();nf.type='lowpass';nf.frequency.value=1500;const ng=offCtx.createGain();ng.gain.setValueAtTime(1,t);ng.gain.exponentialRampToValueAtTime(0.001,t+1.2);n.connect(nf);nf.connect(ng);ng.connect(offMaster);n.start(t);const o=offCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(80,t);o.frequency.exponentialRampToValueAtTime(20,t+0.5);const og=offCtx.createGain();og.gain.setValueAtTime(1,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.5);o.connect(og);og.connect(offMaster);o.start(t);o.stop(t+0.6);}
    else if(v===1){for(let i=0;i<4;i++){const nb=offNoise(0.6);const n=offCtx.createBufferSource();n.buffer=nb;const f=offCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=2000+i*800;f.Q.value=3;const g=offCtx.createGain();g.gain.setValueAtTime(0.7,t+i*0.04);g.gain.exponentialRampToValueAtTime(0.001,t+0.5+i*0.05);n.connect(f);f.connect(g);g.connect(offMaster);n.start(t+i*0.04);}}

    else if(v===3){const o=offCtx.createOscillator();o.type='square';o.frequency.setValueAtTime(1000,t);o.frequency.exponentialRampToValueAtTime(50,t+0.4);const g=offCtx.createGain();g.gain.setValueAtTime(0.8,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);o.connect(g);g.connect(offMaster);o.start(t);o.stop(t+0.6);const nb=offNoise(0.5);const n=offCtx.createBufferSource();n.buffer=nb;const ng=offCtx.createGain();ng.gain.setValueAtTime(0.6,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.5);n.connect(ng);ng.connect(offMaster);n.start(t);}

  }

  const rendered = await offCtx.startRendering();

function audioBufferToWav(buffer) {
  const numCh=1, sr=buffer.sampleRate, data=buffer.getChannelData(0);
  const len=data.length, byteLen=len*2+44;
  const ab=new ArrayBuffer(byteLen); const view=new DataView(ab);
  function str(o,s){for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i));}
  str(0,'RIFF');view.setUint32(4,byteLen-8,true);str(8,'WAVE');str(12,'fmt ');
  view.setUint32(16,16,true);view.setUint16(20,1,true);view.setUint16(22,numCh,true);
  view.setUint32(24,sr,true);view.setUint32(28,sr*2,true);view.setUint16(32,2,true);
  view.setUint16(34,16,true);str(36,'data');view.setUint32(40,len*2,true);
  let off=44; for(let i=0;i<len;i++){let s=Math.max(-1,Math.min(1,data[i]));view.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);off+=2;}
  return ab;
}

function buildUI() {
  const cards = document.getElementById('cards');
  VARIATIONS.forEach((vari, i) => {
    const card = document.createElement('div');
    card.className='var-card';
    card.innerHTML=`
      <div class="var-header">

let visIntervals = {};

function animateVis(i, playing) {
  clearInterval(visIntervals[i]);
  if (!playing) {
    for(let j=0;j<5;j++){const el=document.getElementById(`vb-${i}-${j}`);if(el)el.style.height='4px';}
    return;
  }
  visIntervals[i] = setInterval(()=>{
    for(let j=0;j<5;j++){
      const el=document.getElementById(`vb-${i}-${j}`);
      if(el) el.style.height=(4+Math.random()*18)+'px';
    }
  }, 80);
}

let travelVar = -1;
window.handleLaunch = function(i) { currentVar=i; playLaunch(i); animateVis(i,true); setTimeout(()=>animateVis(i,false),300); };
window.handleTravel = function(i) {
  if(travelVar===i && activeTravel){ stopTravel(); animateVis(i,false); document.getElementById(`trav-${i}`).classList.remove('active'); travelVar=-1; return; }
  if(travelVar>=0){ animateVis(travelVar,false); const el=document.getElementById(`trav-${travelVar}`); if(el)el.classList.remove('active'); }
  startTravel(i); travelVar=i; animateVis(i,true); currentVar=i;
  document.getElementById(`trav-${i}`).classList.add('active');
};
window.handleExplosion = function(i) { currentVar=i; travelVar=-1; if(travelVar>=0){animateVis(travelVar,false);} playExplosion(i); animateVis(i,true); setTimeout(()=>animateVis(i,false),800); };

// ===================== GAME =====================
const GW=700,GH=220,GGND=GH-44;
const GGRAVITY=0.55,JVEL=-11.5,MACC=0.7,MFRIC=0.82,MSPD=5;
let gpx=80,gpy=GGND,gpvx=0,gpvy=0,gonGnd=false;
const gkeys={};
const gplats=[{x:0,y:GGND,w:700,h:44},{x:150,y:GGND-65,w:110,h:10},{x:330,y:GGND-105,w:120,h:10},{x:500,y:GGND-60,w:90,h:10}];
const missiles=[], gparticles=[], explosions=[];
let slideActive2=false, slideOsc2=null, slideGain2=null, filterNode2=null, slideTg2=null;

function initSlide2() {
  if(slideOsc2) return;
  const t=AC.currentTime;
  slideTg2=AC.createGain(); slideTg2.gain.value=0; slideTg2.connect(masterGain);
  filterNode2=AC.createBiquadFilter(); filterNode2.type='bandpass'; filterNode2.frequency.value=900; filterNode2.Q.value=2.5; filterNode2.connect(slideTg2);
  slideGain2=AC.createGain(); slideGain2.gain.value=0; slideGain2.connect(filterNode2);
  slideOsc2=AC.createOscillator(); slideOsc2.type='sawtooth'; slideOsc2.frequency.value=180; slideOsc2.connect(slideGain2); slideOsc2.start();
}

function gstartSlide(spd){if(!AC)return;initSlide2();const t=AC.currentTime;const p=140+Math.abs(spd)*30;slideOsc2.frequency.linearRampToValueAtTime(p,t+0.05);slideGain2.gain.linearRampToValueAtTime(0.55,t+0.04);slideTg2.gain.linearRampToValueAtTime(1,t+0.04);slideActive2=true;}
function gupdSlide(spd){if(!AC||!slideActive2)return;const t=AC.currentTime;slideOsc2.frequency.linearRampToValueAtTime(140+Math.abs(spd)*30,t+0.06);}
function gstopSlide(){if(!AC||!slideActive2)return;const t=AC.currentTime;slideGain2.gain.linearRampToValueAtTime(0,t+0.12);slideTg2.gain.linearRampToValueAtTime(0,t+0.12);slideActive2=false;}

let wasGMoving=false;

function gameUpdate() {
  const left=gkeys['ArrowLeft']||gkeys['a'];const right=gkeys['ArrowRight']||gkeys['d'];const jump=gkeys['ArrowUp']||gkeys[' ']||gkeys['w'];
  if(left)gpvx-=MACC; if(right)gpvx+=MACC;
  if(!left&&!right)gpvx*=MFRIC;
  gpvx=Math.max(-MSPD,Math.min(MSPD,gpvx)); gpvy+=GGRAVITY; gpx+=gpvx; gpy+=gpvy;
  gonGnd=false;
  for(const p of gplats){if(gpx>p.x-10&&gpx<p.x+p.w+10&&gpy>=p.y&&gpy<=p.y+20&&gpvy>=0){gpy=p.y;gpvy=0;gonGnd=true;}}
  if(jump&&gonGnd){gpvy=JVEL;gonGnd=false;}
  gpx=Math.max(12,Math.min(GW-12,gpx));
  const isMov=gonGnd&&Math.abs(gpvx)>0.4;
  if(isMov){if(!wasGMoving)gstartSlide(gpvx);else gupdSlide(gpvx);}else{if(wasGMoving)gstopSlide();}
  wasGMoving=isMov;

  for(let i=missiles.length-1;i>=0;i--){
    const m=missiles[i]; m.x+=m.vx; m.trail.push({x:m.x,y:m.y,life:1});
    if(m.trail.length>18)m.trail.shift();
    m.trail.forEach(p=>p.life-=0.07);
    if(m.x<-20||m.x>GW+20){if(m.travelNodes){m.travelNodes.forEach(n=>{try{n.stop();}catch(e){}});m.travelGain&&m.travelGain.gain.linearRampToValueAtTime(0,AC.currentTime+0.1);}missiles.splice(i,1);}
  }

  for(let i=gparticles.length-1;i>=0;i--){const p=gparticles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.04;if(p.life<=0)gparticles.splice(i,1);}
  for(let i=explosions.length-1;i>=0;i--){const e=explosions[i];e.r+=3;e.life-=0.06;if(e.life<=0)explosions.splice(i,1);}
}

function spawnMissile() {
  const dir=gpvx>=0?1:-1;
  const mx=gpx+dir*16, my=gpy-14;
  playLaunch(currentVar);

  const tg=AC.createGain(); tg.gain.setValueAtTime(0,AC.currentTime); tg.gain.linearRampToValueAtTime(0.4,AC.currentTime+0.08); tg.connect(masterGain);
  const tNodes=[];

  if(currentVar===0){const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=220;const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=900;f.Q.value=2;const og=AC.createGain();og.gain.value=0.35;o.connect(f);f.connect(og);og.connect(tg);o.start();tNodes.push(o);const nb=makeNoise(3);const n=AC.createBufferSource();n.buffer=nb;const ng=AC.createGain();ng.gain.value=0.3;n.connect(ng);ng.connect(tg);n.start();tNodes.push(n);}
  else if(currentVar===1){const o=AC.createOscillator();o.type='square';o.frequency.value=480;const og=AC.createGain();og.gain.value=0.2;o.connect(og);og.connect(tg);o.start();tNodes.push(o);}
  else if(currentVar===2){const nb=makeNoise(3,'pink');const n=AC.createBufferSource();n.buffer=nb;const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=300;const ng=AC.createGain();ng.gain.value=0.5;n.connect(f);f.connect(ng);ng.connect(tg);n.start();tNodes.push(n);const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=55;const og=AC.createGain();og.gain.value=0.4;o.connect(og);og.connect(tg);o.start();tNodes.push(o);}
  else if(currentVar===3){const o=AC.createOscillator();o.type='square';o.frequency.value=1200;const lfo=AC.createOscillator();lfo.type='sine';lfo.frequency.value=18;const lfog=AC.createGain();lfog.gain.value=300;lfo.connect(lfog);lfog.connect(o.frequency);const g=AC.createGain();g.gain.value=0.2;o.connect(g);g.connect(tg);[o,lfo].forEach(x=>x.start());tNodes.push(o,lfo);}
  else if(currentVar===4){const o=AC.createOscillator();o.type='sine';o.frequency.value=900;const lfo=AC.createOscillator();lfo.type='sine';lfo.frequency.value=5;const lfog=AC.createGain();lfog.gain.value=30;lfo.connect(lfog);lfog.connect(o.frequency);const g=AC.createGain();g.gain.value=0.4;o.connect(g);g.connect(tg);[o,lfo].forEach(x=>x.start());tNodes.push(o,lfo);}
  else{const nb1=makeNoise(3,'pink');const n1=AC.createBufferSource();n1.buffer=nb1;const f1=AC.createBiquadFilter();f1.type='bandpass';f1.frequency.value=200;f1.Q.value=1;const ng1=AC.createGain();ng1.gain.value=0.4;n1.connect(f1);f1.connect(ng1);ng1.connect(tg);n1.start();tNodes.push(n1);}

  missiles.push({x:mx,y:my,vx:dir*9,vy:0,trail:[],travelNodes:tNodes,travelGain:tg,varIdx:currentVar});
}

function triggerExplosion(m) {
  playExplosion(m.varIdx);
  explosions.push({x:m.x,y:m.y,r:4,life:1});
  for(let i=0;i<18;i++){gparticles.push({x:m.x,y:m.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*5-2,life:1,color:`hsl(${20+Math.random()*40},90%,${50+Math.random()*20}%)`});}
  if(m.travelNodes){m.travelNodes.forEach(n=>{try{n.stop();}catch(e){}});}
  if(m.travelGain){const t=AC.currentTime;m.travelGain.gain.cancelScheduledValues(t);m.travelGain.gain.linearRampToValueAtTime(0,t+0.05);}
}

function gameDraw() {
  const gc=document.getElementById('game-canvas').getContext('2d');
  gc.fillStyle='#0d0d14'; gc.fillRect(0,0,GW,GH);
  for(let i=0;i<35;i++){gc.globalAlpha=0.2+i%3*0.1;gc.fillStyle='#fff';gc.fillRect((i*173)%GW,(i*97)%(GGND-20),1,1);}gc.globalAlpha=1;

  for(const p of gplats){gc.fillStyle='#1e2240';gc.fillRect(p.x,p.y,p.w,p.h);gc.beginPath();gc.moveTo(p.x,p.y);gc.lineTo(p.x+p.w,p.y);gc.strokeStyle='#4a55a0';gc.lineWidth=2;gc.stroke();}

  for(const m of missiles){
    for(let i=0;i<m.trail.length;i++){const tr=m.trail[i];const a=tr.life*0.6;gc.globalAlpha=a;gc.fillStyle=`hsl(${30+i*4},90%,60%)`;gc.beginPath();gc.arc(tr.x,tr.y,2.5*tr.life,0,Math.PI*2);gc.fill();}
    gc.globalAlpha=1;
    gc.save();gc.translate(m.x,m.y);gc.rotate(m.vx>0?0:Math.PI);
    gc.fillStyle='#f0b040';gc.beginPath();gc.moveTo(10,0);gc.lineTo(-6,5);gc.lineTo(-4,0);gc.lineTo(-6,-5);gc.closePath();gc.fill();
    gc.restore();
  }

  for(const e of explosions){gc.globalAlpha=e.life*0.5;gc.strokeStyle=`hsl(30,90%,65%)`;gc.lineWidth=2;gc.beginPath();gc.arc(e.x,e.y,e.r,0,Math.PI*2);gc.stroke();gc.globalAlpha=e.life*0.3;gc.fillStyle=`hsl(15,90%,60%)`;gc.beginPath();gc.arc(e.x,e.y,e.r*0.6,0,Math.PI*2);gc.fill();gc.globalAlpha=1;}
  for(const p of gparticles){gc.globalAlpha=p.life;gc.fillStyle=p.color;gc.beginPath();gc.arc(p.x,p.y,2.5*p.life,0,Math.PI*2);gc.fill();}gc.globalAlpha=1;

  const tx=gpx,ty=gpy-20,size=20,lean=Math.min(Math.max(gpvx/MSPD,-1),1)*4;
  gc.save();gc.translate(tx,ty+size);
  gc.beginPath();gc.moveTo(lean,-size);gc.lineTo(-size*0.7,size*0.4);gc.lineTo(size*0.7,size*0.4);gc.closePath();
  const spd=Math.abs(gpvx)/MSPD;gc.fillStyle=`rgb(${Math.round(80+spd*120)},${Math.round(180+spd*20)},255)`;gc.fill();gc.strokeStyle=`rgba(100,200,255,0.5)`;gc.lineWidth=2;gc.stroke();
  gc.restore();

  if(!gameStarted){gc.fillStyle='rgba(13,13,20,0.7)';gc.fillRect(0,0,GW,GH);gc.fillStyle='#fff';gc.font='500 14px monospace';gc.textAlign='center';gc.fillText('Click to start game',GW/2,GH/2);}
}

let lastShot=0;
function gameLoop(){
  if(gameStarted){
    gameUpdate();
    if((gkeys['z']||gkeys['Z'])&&Date.now()-lastShot>350){spawnMissile();lastShot=Date.now();}
    for(let i=missiles.length-1;i>=0;i--){
      const m=missiles[i];
      let hit=false;
      for(const p of gplats){if(m.x>p.x&&m.x<p.x+p.w&&m.y>=p.y-4&&m.y<=p.y+p.h){hit=true;break;}}
      if(hit){triggerExplosion(m);missiles.splice(i,1);}
    }
    for(let k=1;k<=6;k++){if(gkeys[String(k)]){currentVar=k-1;gkeys[String(k)]=false;}}
  }
  gameDraw();
  requestAnimationFrame(gameLoop);
}

const gc=document.getElementById('game-canvas');
gc.addEventListener('click',()=>{if(!gameStarted){gameStarted=true;gc.focus();}});
window.addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();gkeys[e.key]=true;});
window.addEventListener('keyup',e=>{gkeys[e.key]=false;});

document.getElementById('init-btn').addEventListener('click',()=>{
  initAudio();
  document.getElementById('init-bar').style.display='none';
  document.getElementById('main').style.display='block';

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hurt & Death Sound Designer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  :root {
    --bg: #080810;
    --panel: #0f0f1e;
    --border: #1e1e3a;
    --hurt: #e05050;
    --hurt-dim: #5a1818;
    --death: #a040e0;
    --death-dim: #3a1060;
    --text: #c8d0e8;
    --muted: #44486a;
    --active: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    padding: 28px 20px 40px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }
  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--active);
    text-shadow: 0 0 20px #ffffff44;
    margin-bottom: 6px;
  }
  header p {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 3px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 900px;
    margin: 0 auto;
  }

  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 5px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .hurt-title .dot  { background: var(--hurt); box-shadow: 0 0 8px var(--hurt); }
  .death-title .dot { background: var(--death); box-shadow: 0 0 8px var(--death); }
  .hurt-title  { color: var(--hurt); }
  .death-title { color: var(--death); }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .hurt-card::before  { background: radial-gradient(ellipse at top left, #e0505018, transparent 60%); }
  .death-card::before { background: radial-gradient(ellipse at top left, #a040e018, transparent 60%); }
  .card.playing::before { opacity: 1; }
  .hurt-card.playing  { border-color: var(--hurt); box-shadow: 0 0 16px #e0505030; }
  .death-card.playing { border-color: var(--death); box-shadow: 0 0 16px #a040e030; }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-label {
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--muted);
  }
  .card-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .hurt-card  .card-name { color: var(--hurt); }
  .death-card .card-name { color: var(--death); }

  .card-desc {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
    line-height: 1.5;
    min-height: 2.4em;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .btn {
    flex: 1;
    border: none;
    border-radius: 6px;
    padding: 9px 0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-play {
    background: transparent;
    border: 1px solid currentColor;
  }
  .hurt-card  .btn-play { color: var(--hurt); }
  .death-card .btn-play { color: var(--death); }
  .hurt-card  .btn-play:hover { background: var(--hurt-dim); }
  .death-card .btn-play:hover { background: var(--death-dim); }

  .btn-dl {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    flex: 0 0 44px;
  }
  .btn-dl:hover { border-color: var(--text); color: var(--text); }

  /* Waveform visualiser bar */
  .waveform {
    height: 28px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  .card.playing .waveform { opacity: 1; }
  .waveform-bar {
    flex: 1;
    border-radius: 2px 2px 0 0;
    transition: height 0.05s;
  }
  .hurt-card  .waveform-bar { background: var(--hurt); }
  .death-card .waveform-bar { background: var(--death); }

  .waveforms-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 900px;
    margin: 0 auto;
  }

  footer {
    text-align: center;
    margin-top: 32px;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 3px;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>SFX DESIGNER</h1>
  <p>HURT &amp; DEATH — 6 VARIATIONS EACH</p>
</header>

<div style="max-width:900px;margin:0 auto 24px;">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
    <div class="section-title hurt-title"><span class="dot"></span>HURT SOUNDS</div>
    <div class="section-title death-title"><span class="dot"></span>DEATH SOUNDS</div>
  </div>
</div>

<div class="grid" id="cardGrid"></div>

<footer>CLICK ▶ TO PREVIEW — CLICK ⬇ TO DOWNLOAD WAV</footer>

<script>
// ─── Web Audio ──────────────────────────────────────────────────────────────
let actx = null;
function getCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}

// ─── WAV Encoder ────────────────────────────────────────────────────────────
function encodeWAV(buffer) {
  const sr = buffer.sampleRate;
  const ch = 1;
  const samples = buffer.getChannelData(0);
  const n = samples.length;
  const ab = new ArrayBuffer(44 + n * 2);
  const v  = new DataView(ab);
  const ws = (o, s) => { for (let i=0;i<s.length;i++) v.setUint8(o+i, s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4, 36+n*2,true); ws(8,'WAVE'); ws(12,'fmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,ch,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*ch*2,true);
  v.setUint16(32,ch*2,true); v.setUint16(34,16,true);
  ws(36,'data'); v.setUint32(40,n*2,true);
  let o=44;
  for (let i=0;i<n;i++) {
    const s=Math.max(-1,Math.min(1,samples[i]));
    v.setInt16(o, s<0?s*0x8000:s*0x7FFF, true); o+=2;
  }
  return ab;
}

function downloadBuffer(buffer, filename) {
  const blob = new Blob([encodeWAV(buffer)], {type:'audio/wav'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ─── Noise helpers ───────────────────────────────────────────────────────────
function makeNoise(ctx, dur) {
  const n = Math.ceil(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, n, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<n;i++) d[i] = Math.random()*2-1;
  return buf;
}

function playThrough(ctx, nodes, dest) {
  for (let i=0;i<nodes.length-1;i++) nodes[i].connect(nodes[i+1]);
  nodes[nodes.length-1].connect(dest||ctx.destination);
}

// ─── HURT SOUND GENERATORS ───────────────────────────────────────────────────
// Style reference: short (0.1–0.4s), snappy attack, moderate brightness, low-mid character

const hurtDefs = [
  {
    name: 'SHARP SMACK',
    desc: 'Fast crack + noise burst. Clean impact.',
    filename: 'hurt-sharp-smack.wav',
    gen: (ctx, dest) => {
      const dur = 0.28;
      // Noise burst
      const src = ctx.createBufferSource();
      src.buffer = makeNoise(ctx, dur);
      const bpf = ctx.createBiquadFilter();
      bpf.type='bandpass'; bpf.frequency.value=900; bpf.Q.value=1.2;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.9, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      // Tonal thud
      const osc = ctx.createOscillator();
      osc.type='square'; osc.frequency.value=180;
      osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime+0.08);
      const og = ctx.createGain();
      og.gain.setValueAtTime(0.6, ctx.currentTime);
      og.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.12);
      playThrough(ctx,[src,bpf,g],dest);
      playThrough(ctx,[osc,og],dest);
      src.start(); osc.start(); src.stop(ctx.currentTime+dur); osc.stop(ctx.currentTime+0.14);
      return dur;
    }
  },
  {
    name: 'HOLLOW THUD',
    desc: 'Low-mid body hit. Dull resonant knock.',
    filename: 'hurt-hollow-thud.wav',
    gen: (ctx, dest) => {
      const dur = 0.32;
      const osc = ctx.createOscillator();
      osc.type='triangle'; osc.frequency.value=220;
      osc.frequency.exponentialRampToValueAtTime(45, ctx.currentTime+0.18);
      const og = ctx.createGain();
      og.gain.setValueAtTime(0.85, ctx.currentTime);
      og.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
      const dist = ctx.createWaveShaper();
      const curve = new Float32Array(256);
      for (let i=0;i<256;i++){const x=i/128-1; curve[i]=x<0?-Math.pow(-x,0.6):Math.pow(x,0.6);}
      dist.curve = curve;
      const lp = ctx.createBiquadFilter();
      lp.type='lowpass'; lp.frequency.value=600;
      playThrough(ctx,[osc,og,dist,lp],dest);
      osc.start(); osc.stop(ctx.currentTime+dur);
      return dur;
    }
  },
  {
    name: 'ELECTRIC ZAP',
    desc: 'Buzzy crackle. Zap + hiss tail.',
    filename: 'hurt-electric-zap.wav',
    gen: (ctx, dest) => {
      const dur = 0.22;
      const src = ctx.createBufferSource();
      src.buffer = makeNoise(ctx, dur);
      const hp = ctx.createBiquadFilter();
      hp.type='highpass'; hp.frequency.value=2000;
      const bp = ctx.createBiquadFilter();
      bp.type='bandpass'; bp.frequency.value=3500; bp.Q.value=3;
      const g = ctx.createGain();
      g.gain.setValueAtTime(1.0, ctx.currentTime);
      g.gain.setValueAtTime(0.6, ctx.currentTime+0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
      // Buzz osc
      const osc = ctx.createOscillator();
      osc.type='sawtooth'; osc.frequency.value=80;
      const og = ctx.createGain();
      og.gain.setValueAtTime(0.4, ctx.currentTime);
      og.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.08);
      playThrough(ctx,[src,hp,bp,g],dest);
      playThrough(ctx,[osc,og],dest);
      src.start(); osc.start(); src.stop(ctx.currentTime+dur); osc.stop(ctx.currentTime+0.1);
      return dur;
    }
  },
  {
    name: 'CRUNCH HIT',
    desc: 'Gritty distorted impact. Chunky & aggressive.',
    filename: 'hurt-crunch-hit.wav',
    gen: (ctx, dest) => {
      const dur = 0.35;
      const src = ctx.createBufferSource();
      src.buffer = makeNoise(ctx, dur);
      const bp = ctx.createBiquadFilter();
      bp.type='bandpass'; bp.frequency.value=400; bp.Q.value=0.8;
      const dist = ctx.createWaveShaper();
      const curve = new Float32Array(512);
      for (let i=0;i<512;i++){const x=i/256-1; curve[i]=Math.tanh(x*6)*0.9;}
      dist.curve = curve;
      const g = ctx.createGain();
      g.gain.setValueAtTime(1.0, ctx.currentTime);
      g.gain.setValueAtTime(0.7, ctx.currentTime+0.01);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
      const lp = ctx.createBiquadFilter();
      lp.type='lowpass'; lp.frequency.value=1200;
      playThrough(ctx,[src,bp,dist,g,lp],dest);
      src.start(); src.stop(ctx.currentTime+dur);
      return dur;
    }
  },
  {
    name: 'DULL KNOCK',
    desc: 'Soft low-freq knock. Subtle damage.',
    filename: 'hurt-dull-knock.wav',
    gen: (ctx, dest) => {
      const dur = 0.20;
      const osc = ctx.createOscillator();
      osc.type='sine'; osc.frequency.value=160;
      osc.frequency.exponentialRampToValueAtTime(55, ctx.currentTime+0.12);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.9, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
      const src = ctx.createBufferSource();
      src.buffer = makeNoise(ctx, 0.04);
      const ng = ctx.createGain(); ng.gain.value = 0.3;
      const nlp = ctx.createBiquadFilter();
      nlp.type='lowpass'; nlp.frequency.value=300;
      playThrough(ctx,[osc,g],dest);
      playThrough(ctx,[src,nlp,ng],dest);
      osc.start(); osc.stop(ctx.currentTime+dur);
      src.start(); src.stop(ctx.currentTime+0.04);
      return dur;
    }
  },
  {
    name: 'GLITCH SPIKE',
    desc: 'Digital glitch pop. Sci-fi / robotic pain.',
    filename: 'hurt-glitch-spike.wav',
    gen: (ctx, dest) => {
      const dur = 0.18;
      // Triple rapid blip
      for (let i=0;i<3;i++) {
        const t = ctx.currentTime + i*0.045;
        const osc = ctx.createOscillator();
        osc.type='square';
        osc.frequency.setValueAtTime(800-i*180, t);
        osc.frequency.exponentialRampToValueAtTime(200, t+0.04);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.5-i*0.1, t);
        g.gain.exponentialRampToValueAtTime(0.001, t+0.05);
        const hp = ctx.createBiquadFilter();
        hp.type='highpass'; hp.frequency.value=400;
        playThrough(ctx,[osc,g,hp],dest);
        osc.start(t); osc.stop(t+0.06);
      }
      return dur;
    }
  }
];

// ─── DEATH SOUND GENERATORS ──────────────────────────────────────────────────
// Style: longer (0.6–1.2s), multiple layers, "breaks into pieces" disintegration

const deathDefs = [
  {
    name: 'SHATTER BURST',
    desc: 'Explosive crack then raining debris. Crystal break.',
    filename: 'death-shatter-burst.wav',
    gen: (ctx, dest) => {
      const dur = 1.0;
      // Initial impact crack
      const noise = ctx.createBufferSource();
      noise.buffer = makeNoise(ctx, 0.06);
      const hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=3000;
      const ig = ctx.createGain();
      ig.gain.setValueAtTime(1.2, ctx.currentTime);
      ig.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.06);
      playThrough(ctx,[noise,hp,ig],dest);
      noise.start(); noise.stop(ctx.currentTime+0.06);
      // Scattered debris pieces (8 fragments)
      for (let i=0;i<8;i++) {
        const t = ctx.currentTime + 0.04 + Math.random()*0.5;
        const freq = 200 + Math.random()*2000;
        const o = ctx.createOscillator();
        o.type='sine'; o.frequency.value=freq;
        o.frequency.exponentialRampToValueAtTime(freq*0.3, t+0.12);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0, t-0.001);
        g.gain.setValueAtTime(0.25-i*0.02, t);
        g.gain.exponentialRampToValueAtTime(0.001, t+0.15+Math.random()*0.3);
        playThrough(ctx,[o,g],dest);
        o.start(t); o.stop(t+0.5);
      }
      return dur;
    }
  },
  {
    name: 'DIGITAL COLLAPSE',
    desc: 'Glitchy disintegration + pitch-down crash.',
    filename: 'death-digital-collapse.wav',
    gen: (ctx, dest) => {
      const dur = 0.9;
      // Descending pitch crash
      const osc = ctx.createOscillator();
      osc.type='sawtooth'; osc.frequency.value=400;
      osc.frequency.exponentialRampToValueAtTime(20, ctx.currentTime+0.5);
      const dist = ctx.createWaveShaper();
      const cv = new Float32Array(256);
      for (let i=0;i<256;i++){const x=i/128-1; cv[i]=Math.tanh(x*8);}
      dist.curve=cv;
      const og = ctx.createGain();
      og.gain.setValueAtTime(0.6, ctx.currentTime);
      og.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.55);
      playThrough(ctx,[osc,dist,og],dest);
      osc.start(); osc.stop(ctx.currentTime+0.6);
      // Glitch bursts
      for (let i=0;i<5;i++) {
        const t = ctx.currentTime + i*0.1;
        const nb = ctx.createBufferSource();
        nb.buffer = makeNoise(ctx, 0.04);
        const nbp = ctx.createBiquadFilter(); nbp.type='bandpass';
        nbp.frequency.value=1000+i*400; nbp.Q.value=3;
        const ng = ctx.createGain();
        ng.gain.setValueAtTime(0.4-i*0.05, t);
        ng.gain.exponentialRampToValueAtTime(0.001, t+0.05);
        playThrough(ctx,[nb,nbp,ng],dest);
        nb.start(t); nb.stop(t+0.05);
      }
      return dur;
    }
  },
  {
    name: 'STONE CRUMBLE',
    desc: 'Heavy rumble + cracking debris. Solid object breaking.',
    filename: 'death-stone-crumble.wav',
    gen: (ctx, dest) => {
      const dur = 1.1;
      // Low rumble
      const nb = ctx.createBufferSource();
      nb.buffer = makeNoise(ctx, dur);
      const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=250;
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0.8, ctx.currentTime);
      ng.gain.setValueAtTime(0.8, ctx.currentTime+0.1);
      ng.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
      playThrough(ctx,[nb,lp,ng],dest);
      nb.start(); nb.stop(ctx.currentTime+dur);
      // 10 cracking fragments
      for (let i=0;i<10;i++) {
        const t = ctx.currentTime + Math.pow(i/10, 0.7)*0.7;
        const sb = ctx.createBufferSource();
        sb.buffer = makeNoise(ctx, 0.08);
        const bp = ctx.createBiquadFilter(); bp.type='bandpass';
        bp.frequency.value=300+i*80; bp.Q.value=1.5;
        const sg = ctx.createGain();
        sg.gain.setValueAtTime(0, t-0.001);
        sg.gain.setValueAtTime(0.35-i*0.02, t);
        sg.gain.exponentialRampToValueAtTime(0.001, t+0.1);
        playThrough(ctx,[sb,bp,sg],dest);
        sb.start(t); sb.stop(t+0.1);
      }
      return dur;
    }
  },
  {
    name: 'SPARK EXPLOSION',
    desc: 'Impact + electrical scatter. Pieces flying everywhere.',
    filename: 'death-spark-explosion.wav',
    gen: (ctx, dest) => {
      const dur = 0.85;
      // Main boom
      const boom = ctx.createOscillator();
      boom.type='sine'; boom.frequency.value=120;
      boom.frequency.exponentialRampToValueAtTime(18, ctx.currentTime+0.3);
      const bg = ctx.createGain();
      bg.gain.setValueAtTime(1.0, ctx.currentTime);
      bg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.35);
      playThrough(ctx,[boom,bg],dest);
      boom.start(); boom.stop(ctx.currentTime+0.4);
      // Noise burst
      const nb = ctx.createBufferSource();
      nb.buffer = makeNoise(ctx, 0.12);
      const nhp = ctx.createBiquadFilter(); nhp.type='highpass'; nhp.frequency.value=800;
      const ng2 = ctx.createGain();
      ng2.gain.setValueAtTime(1.0, ctx.currentTime);
      ng2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.12);
      playThrough(ctx,[nb,nhp,ng2],dest);
      nb.start(); nb.stop(ctx.currentTime+0.12);
      // Spark crackles
      for (let i=0;i<12;i++) {
        const t = ctx.currentTime + 0.05 + Math.random()*0.6;
        const sb = ctx.createBufferSource();
        sb.buffer = makeNoise(ctx, 0.03);
        const shp = ctx.createBiquadFilter(); shp.type='highpass'; shp.frequency.value=4000;
        const sg = ctx.createGain();
        sg.gain.setValueAtTime(0, t-0.001);
        sg.gain.setValueAtTime(0.3, t);
        sg.gain.exponentialRampToValueAtTime(0.001, t+0.04);
        playThrough(ctx,[sb,shp,sg],dest);
        sb.start(t); sb.stop(t+0.04);
      }
      return dur;
    }
  },
  {
    name: 'DEEP FRACTURE',
    desc: 'Slow-building crack. Heavy split then silence.',
    filename: 'death-deep-fracture.wav',
    gen: (ctx, dest) => {
      const dur = 1.2;
      // Tension build — rising tone
      const rise = ctx.createOscillator();
      rise.type='triangle'; rise.frequency.value=60;
      rise.frequency.linearRampToValueAtTime(90, ctx.currentTime+0.25);
      const rg = ctx.createGain();
      rg.gain.setValueAtTime(0.3, ctx.currentTime);
      rg.gain.linearRampToValueAtTime(0.7, ctx.currentTime+0.25);
      rg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.3);
      playThrough(ctx,[rise,rg],dest);
      rise.start(); rise.stop(ctx.currentTime+0.35);
      // BIG crack
      const t2 = ctx.currentTime + 0.28;
      const cnb = ctx.createBufferSource();
      cnb.buffer = makeNoise(ctx, 0.1);
      const clp = ctx.createBiquadFilter(); clp.type='lowpass'; clp.frequency.value=800;
      const cg = ctx.createGain();
      cg.gain.setValueAtTime(1.5, t2);
      cg.gain.exponentialRampToValueAtTime(0.001, t2+0.12);
      playThrough(ctx,[cnb,clp,cg],dest);
      cnb.start(t2); cnb.stop(t2+0.12);
      // Rolling debris
      const rnb = ctx.createBufferSource();
      rnb.buffer = makeNoise(ctx, 0.7);
      const rlp = ctx.createBiquadFilter(); rlp.type='bandpass'; rlp.frequency.value=200; rlp.Q.value=0.5;
      const rng = ctx.createGain();
      rng.gain.setValueAtTime(0, t2+0.1);
      rng.gain.linearRampToValueAtTime(0.4, t2+0.2);
      rng.gain.exponentialRampToValueAtTime(0.001, t2+0.8);
      playThrough(ctx,[rnb,rlp,rng],dest);
      rnb.start(t2+0.1); rnb.stop(t2+0.9);
      return dur;
    }
  },
  {
    name: 'VOID DISSOLVE',
    desc: 'Eerie pitch-down fade. Like vanishing into nothing.',
    filename: 'death-void-dissolve.wav',
    gen: (ctx, dest) => {
      const dur = 1.3;
      // Chord dissolve — 3 oscillators detuning downward
      const freqs = [440, 554, 660];
      freqs.forEach((f, i) => {
        const o = ctx.createOscillator();
        o.type='sine'; o.frequency.value=f;
        o.frequency.exponentialRampToValueAtTime(f*0.1, ctx.currentTime+dur*0.8);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.25, ctx.currentTime+i*0.04);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
        const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2000;
        lp.frequency.exponentialRampToValueAtTime(100, ctx.currentTime+dur*0.7);
        playThrough(ctx,[o,g,lp],dest);
        o.start(ctx.currentTime+i*0.04); o.stop(ctx.currentTime+dur+0.1);
      });
      // Impact noise at start
      const nb = ctx.createBufferSource();
      nb.buffer = makeNoise(ctx, 0.08);
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0.7, ctx.currentTime);
      ng.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.1);
      playThrough(ctx,[nb,ng],dest);
      nb.start(); nb.stop(ctx.currentTime+0.1);
      return dur;
    }
  }
];

// ─── Offline render ─────────────────────────────────────────────────────────
function renderOffline(genFn, filename) {
  const tmpCtx = new (window.AudioContext || window.webkitAudioContext)();
  const dur = genFn(tmpCtx, null); // dry-run to get duration
  tmpCtx.close();

  const sr = 44100;
  const offCtx = new OfflineAudioContext(1, Math.ceil(sr * (dur + 0.2)), sr);
  genFn(offCtx, offCtx.destination);
  offCtx.startRendering().then(buf => downloadBuffer(buf, filename));
}

// ─── UI Build ────────────────────────────────────────────────────────────────
const grid = document.getElementById('cardGrid');
const allDefs = [hurtDefs, deathDefs];

// Interleave: hurt[0], death[0], hurt[1], death[1]...
for (let i = 0; i < 6; i++) {
  ['hurt','death'].forEach((type, ti) => {
    const def = allDefs[ti][i];
    const isHurt = type === 'hurt';

    const card = document.createElement('div');
    card.className = `card ${type}-card`;
    card.id = `card-${type}-${i}`;

    // Waveform bars (decorative)
    const bars = Array.from({length:24}, (_,b) => {
      const h = 4 + Math.random()*22;
      return `<div class="waveform-bar" style="height:${h}px" data-base="${h}"></div>`;
    }).join('');

    card.innerHTML = `
      <div class="card-header">
        <span class="card-label">VAR ${String(i+1).padStart(2,'0')} / ${isHurt?'HURT':'DEATH'}</span>
        <span class="card-name">${def.name}</span>
      </div>
      <div class="waveform">${bars}</div>
      <div class="card-desc">${def.desc}</div>
      <div class="card-actions">
        <button class="btn btn-play" onclick="previewSound('${type}',${i},this)">▶ PREVIEW</button>
        <button class="btn btn-dl" title="Download WAV" onclick="downloadSound('${type}',${i})">⬇</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ─── Preview & Download ──────────────────────────────────────────────────────
let activeTimers = {};

function previewSound(type, idx, btn) {
  const ctx = getCtx();
  const def = type === 'hurt' ? hurtDefs[idx] : deathDefs[idx];
  const cardId = `card-${type}-${idx}`;
  const card = document.getElementById(cardId);

  // Animate bars
  const bars = card.querySelectorAll('.waveform-bar');
  card.classList.add('playing');
  btn.textContent = '■ STOP';

  const animKey = `${type}-${idx}`;
  if (activeTimers[animKey]) clearInterval(activeTimers[animKey]);

  activeTimers[animKey] = setInterval(() => {
    bars.forEach(b => {
      const base = parseFloat(b.dataset.base);
      b.style.height = (base * (0.4 + Math.random() * 1.2)) + 'px';
    });
  }, 80);

  const dur = def.gen(ctx, ctx.destination);

  setTimeout(() => {
    clearInterval(activeTimers[animKey]);
    card.classList.remove('playing');
    bars.forEach(b => { b.style.height = b.dataset.base + 'px'; });
    btn.textContent = '▶ PREVIEW';
  }, dur * 1000 + 100);
}

function downloadSound(type, idx) {
  const def = type === 'hurt' ? hurtDefs[idx] : deathDefs[idx];
  renderOffline(def.gen, def.filename);
}
</script>

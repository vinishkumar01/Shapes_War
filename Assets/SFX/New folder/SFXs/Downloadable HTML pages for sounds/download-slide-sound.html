<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slide Sound Exporter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #aef;
    gap: 20px;
  }
  h1 { font-size: 1rem; letter-spacing: 4px; color: #7df; text-transform: uppercase; }
  p { font-size: 0.72rem; color: #556; letter-spacing: 2px; }
  button {
    background: #1a3a5c;
    color: #7df;
    border: 1.5px solid #4a80b0;
    border-radius: 6px;
    padding: 12px 32px;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s;
  }
  button:hover { background: #254d78; box-shadow: 0 0 16px #4a80b055; }
  #status { font-size: 0.7rem; color: #4df; letter-spacing: 2px; min-height: 1em; }
</style>
</head>
<body>
<h1>Slide Sound Exporter</h1>
<p>Generates a 3-second loopable slide sound WAV</p>
<button onclick="generate()">⬇ DOWNLOAD SLIDE SOUND</button>
<div id="status"></div>

<script>
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function generate() {
  setStatus('Generating...');

  const sampleRate = 44100;
  const duration   = 3.0; // seconds
  const numSamples = sampleRate * duration;

  // Offline render
  const offCtx = new OfflineAudioContext(1, numSamples, sampleRate);

  // White noise buffer
  const bufLen = sampleRate * 0.5;
  const buffer = offCtx.createBuffer(1, bufLen, sampleRate);
  const data   = buffer.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

  const src = offCtx.createBufferSource();
  src.buffer = buffer;
  src.loop   = true;

  // Band-pass filter (slide character)
  const bpf = offCtx.createBiquadFilter();
  bpf.type            = 'bandpass';
  bpf.frequency.value = 320;
  bpf.Q.value         = 1.4;

  // Low-shelf for body
  const shelf = offCtx.createBiquadFilter();
  shelf.type            = 'lowshelf';
  shelf.frequency.value = 200;
  shelf.gain.value      = 6;

  // Master gain
  const gain = offCtx.createGain();
  gain.gain.value = 0;
  // Fade in
  gain.gain.setValueAtTime(0, 0);
  gain.gain.linearRampToValueAtTime(0.07, 0.08);
  // Hold
  gain.gain.setValueAtTime(0.07, duration - 0.25);
  // Fade out at end (for clean loop)
  gain.gain.linearRampToValueAtTime(0, duration);

  src.connect(bpf);
  bpf.connect(shelf);
  shelf.connect(gain);
  gain.connect(offCtx.destination);
  src.start(0);

  offCtx.startRendering().then(rendered => {
    const wav = encodeWAV(rendered);
    const blob = new Blob([wav], { type: 'audio/wav' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'slide-sound.wav';
    a.click();
    URL.revokeObjectURL(url);
    setStatus('✓ Downloaded!');
  });
}

function encodeWAV(audioBuffer) {
  const numChannels = 1;
  const sampleRate  = audioBuffer.sampleRate;
  const samples     = audioBuffer.getChannelData(0);
  const numSamples  = samples.length;
  const byteRate    = sampleRate * numChannels * 2;
  const blockAlign  = numChannels * 2;
  const dataSize    = numSamples * 2;
  const buffer      = new ArrayBuffer(44 + dataSize);
  const view        = new DataView(buffer);

  function writeStr(offset, str) {
    for (let i = 0; i < str.length; i++)
      view.setUint8(offset + i, str.charCodeAt(i));
  }

  writeStr(0,  'RIFF');
  view.setUint32(4,  36 + dataSize, true);
  writeStr(8,  'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16,           true);
  view.setUint16(20, 1,            true); // PCM
  view.setUint16(22, numChannels,  true);
  view.setUint32(24, sampleRate,   true);
  view.setUint32(28, byteRate,     true);
  view.setUint16(32, blockAlign,   true);
  view.setUint16(34, 16,           true); // 16-bit
  writeStr(36, 'data');
  view.setUint32(40, dataSize,     true);

  // Convert float32 → int16
  let offset = 44;
  for (let i = 0; i < numSamples; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    offset += 2;
  }

  return buffer;
}
</script>
</body>
</html>
